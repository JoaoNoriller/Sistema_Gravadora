spring.application.name=sistemaGravadora

# Banco H2 em memória — usado para deploy no Render
spring.datasource.url=jdbc:h2:mem:sistemagravadora;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=root
spring.datasource.password= 

# Console H2 disponível em /h2-console
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
server.port=${PORT:8080}